<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Minas Carboneras – Club Atlético Peñarol</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #1a1a1a;
      min-height: 100vh;
      padding: 24px 16px;
      font-family: 'Inter', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }

    .logo-header {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-top: 8px;
    }

    .shield { width: 52px; height: 60px; flex-shrink: 0; }

    .title-block h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 36px;
      color: #F5C518;
      letter-spacing: 2px;
      line-height: 1;
    }

    .title-block p {
      font-size: 11px;
      color: #888;
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-top: 2px;
    }

    .controls {
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
      justify-content: center;
    }

    .diff-btn {
      background: transparent;
      border: 1.5px solid #444;
      color: #aaa;
      padding: 6px 16px;
      border-radius: 6px;
      font-size: 12px;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      transition: all 0.15s;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .diff-btn:hover { border-color: #F5C518; color: #F5C518; }
    .diff-btn.active { background: #F5C518; border-color: #F5C518; color: #1a1a1a; font-weight: 600; }

    .stats-bar {
      display: flex;
      gap: 24px;
      background: #252525;
      border: 1px solid #333;
      border-radius: 10px;
      padding: 12px 24px;
      align-items: center;
    }

    .stat { display: flex; flex-direction: column; align-items: center; gap: 2px; }

    .stat-val {
      font-size: 22px;
      font-family: 'Bebas Neue', sans-serif;
      color: #F5C518;
      letter-spacing: 1px;
      min-width: 40px;
      text-align: center;
    }

    .stat-label { font-size: 10px; color: #666; letter-spacing: 2px; text-transform: uppercase; }
    .stat-divider { width: 1px; height: 30px; background: #333; }

    #reset-btn {
      background: #F5C518;
      border: none;
      color: #1a1a1a;
      width: 42px;
      height: 42px;
      border-radius: 50%;
      font-size: 20px;
      cursor: pointer;
      transition: transform 0.1s, background 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #reset-btn:hover { background: #ffd740; transform: scale(1.1) rotate(15deg); }
    #reset-btn:active { transform: scale(0.95); }

    #board {
      display: grid;
      gap: 3px;
      background: #111;
      border: 2px solid #F5C518;
      border-radius: 10px;
      padding: 10px;
    }

    .cell {
      width: 36px;
      height: 36px;
      border-radius: 5px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.1s, transform 0.1s;
      user-select: none;
      border: none;
      font-family: 'Inter', sans-serif;
    }

    .cell.hidden { background: #2d2d2d; border: 1.5px solid #3a3a3a; }
    .cell.hidden:hover { background: #383838; transform: scale(1.05); }
    .cell.flagged { background: #2d2d2d; border: 1.5px solid #F5C518; }
    .cell.revealed { background: #1f1f1f; border: 1.5px solid #2a2a2a; cursor: default; }
    .cell.mine-hit { background: #8B0000; border-color: #cc0000; }
    .cell.mine-shown { background: #333; border-color: #555; }

    .n1 { color: #6fa3ef; }
    .n2 { color: #67c46f; }
    .n3 { color: #ef6f6f; }
    .n4 { color: #9b6fd8; }
    .n5 { color: #ef8c3f; }
    .n6 { color: #5cc8c8; }
    .n7 { color: #f0e46f; }
    .n8 { color: #aaa; }

    #message {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 28px;
      letter-spacing: 3px;
      text-align: center;
      min-height: 36px;
    }

    .msg-win { color: #F5C518; }
    .msg-lose { color: #cc3333; }
    .msg-play { color: #555; }

    .instructions { font-size: 11px; color: #555; text-align: center; letter-spacing: 1px; line-height: 1.8; }
    .instructions span { color: #888; }

    footer { font-size: 10px; color: #333; letter-spacing: 2px; text-transform: uppercase; margin-top: 8px; }
  </style>
</head>
<body>

  <div class="logo-header">
    <svg class="shield" viewBox="0 0 52 60" xmlns="http://www.w3.org/2000/svg">
      <path d="M26 2 L50 12 L50 36 Q50 52 26 58 Q2 52 2 36 L2 12 Z" fill="#F5C518"/>
      <line x1="26" y1="2" x2="26" y2="58" stroke="#1a1a1a" stroke-width="2.5"/>
      <path d="M2 30 L50 30" stroke="#1a1a1a" stroke-width="2.5"/>
      <rect x="2" y="12" width="24" height="18" fill="#1a1a1a"/>
      <rect x="26" y="30" width="24" height="22" fill="#1a1a1a"/>
    </svg>
    <div class="title-block">
      <h1>Minas Carboneras</h1>
      <p>Club Atlético Peñarol</p>
    </div>
  </div>

  <div class="controls">
    <button class="diff-btn active" onclick="setDiff('facil', this)">Fácil</button>
    <button class="diff-btn" onclick="setDiff('medio', this)">Medio</button>
    <button class="diff-btn" onclick="setDiff('dificil', this)">Difícil</button>
  </div>

  <div class="stats-bar">
    <div class="stat">
      <span class="stat-val" id="mines-left">10</span>
      <span class="stat-label">Minas</span>
    </div>
    <div class="stat-divider"></div>
    <button id="reset-btn" onclick="initGame()" title="Nueva partida">⚽</button>
    <div class="stat-divider"></div>
    <div class="stat">
      <span class="stat-val" id="timer">0</span>
      <span class="stat-label">Segundos</span>
    </div>
  </div>

  <div id="message" class="msg-play">¡Arriba Peñarol!</div>
  <div id="board"></div>

  <div class="instructions">
    <span>Click izquierdo</span> para revelar &nbsp;·&nbsp; <span>Click derecho</span> para marcar bandera
  </div>

  <footer>Minas Carboneras &mdash; Hecho con 💛 para los aurinegros</footer>

  <script>
    const DIFFS = {
      facil:   { rows: 9,  cols: 9,  mines: 10 },
      medio:   { rows: 12, cols: 12, mines: 25 },
      dificil: { rows: 16, cols: 16, mines: 50 },
    };

    let cfg = DIFFS.facil;
    let board = [], revealed = [], flagged = [];
    let gameOver = false, firstClick = true;
    let timerInterval = null, seconds = 0;
    let minesLeft = 0;

    function setDiff(d, btn) {
      cfg = DIFFS[d];
      document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      initGame();
    }

    function initGame() {
      clearInterval(timerInterval);
      seconds = 0;
      document.getElementById('timer').textContent = '0';
      gameOver = false;
      firstClick = true;
      minesLeft = cfg.mines;
      document.getElementById('mines-left').textContent = minesLeft;
      document.getElementById('message').textContent = '¡Arriba Peñarol!';
      document.getElementById('message').className = 'msg-play';

      board    = Array.from({length: cfg.rows}, () => Array(cfg.cols).fill(0));
      revealed = Array.from({length: cfg.rows}, () => Array(cfg.cols).fill(false));
      flagged  = Array.from({length: cfg.rows}, () => Array(cfg.cols).fill(false));

      renderBoard();
    }

    function placeMines(skipR, skipC) {
      let placed = 0;
      while (placed < cfg.mines) {
        const r = Math.floor(Math.random() * cfg.rows);
        const c = Math.floor(Math.random() * cfg.cols);
        if (board[r][c] === -1) continue;
        if (Math.abs(r - skipR) <= 1 && Math.abs(c - skipC) <= 1) continue;
        board[r][c] = -1;
        placed++;
      }
      for (let r = 0; r < cfg.rows; r++) {
        for (let c = 0; c < cfg.cols; c++) {
          if (board[r][c] === -1) continue;
          let count = 0;
          for (let dr = -1; dr <= 1; dr++) for (let dc = -1; dc <= 1; dc++) {
            const nr = r+dr, nc = c+dc;
            if (nr >= 0 && nr < cfg.rows && nc >= 0 && nc < cfg.cols && board[nr][nc] === -1) count++;
          }
          board[r][c] = count;
        }
      }
    }

    function renderBoard() {
      const el = document.getElementById('board');
      el.style.gridTemplateColumns = `repeat(${cfg.cols}, 36px)`;
      el.innerHTML = '';
      for (let r = 0; r < cfg.rows; r++) {
        for (let c = 0; c < cfg.cols; c++) {
          const cell = document.createElement('div');
          cell.className = 'cell hidden';
          cell.dataset.r = r;
          cell.dataset.c = c;
          cell.addEventListener('click', onLeftClick);
          cell.addEventListener('contextmenu', onRightClick);
          el.appendChild(cell);
        }
      }
    }

    function getCell(r, c) {
      return document.querySelector(`.cell[data-r="${r}"][data-c="${c}"]`);
    }

    function onLeftClick() {
      const r = +this.dataset.r, c = +this.dataset.c;
      if (gameOver || revealed[r][c] || flagged[r][c]) return;
      if (firstClick) {
        firstClick = false;
        placeMines(r, c);
        timerInterval = setInterval(() => {
          seconds++;
          document.getElementById('timer').textContent = seconds;
        }, 1000);
      }
      if (board[r][c] === -1) { loseGame(r, c); return; }
      revealCell(r, c);
      checkWin();
    }

    function onRightClick(e) {
      e.preventDefault();
      const r = +this.dataset.r, c = +this.dataset.c;
      if (gameOver || revealed[r][c]) return;
      flagged[r][c] = !flagged[r][c];
      minesLeft += flagged[r][c] ? -1 : 1;
      document.getElementById('mines-left').textContent = minesLeft;
      const cell = getCell(r, c);
      cell.className = flagged[r][c] ? 'cell flagged' : 'cell hidden';
      cell.textContent = flagged[r][c] ? '🚩' : '';
    }

    function revealCell(r, c) {
      if (r < 0 || r >= cfg.rows || c < 0 || c >= cfg.cols) return;
      if (revealed[r][c] || flagged[r][c]) return;
      revealed[r][c] = true;
      const cell = getCell(r, c);
      const val = board[r][c];
      cell.className = 'cell revealed';
      cell.removeEventListener('click', onLeftClick);
      cell.removeEventListener('contextmenu', onRightClick);
      if (val > 0) { cell.textContent = val; cell.classList.add('n' + val); }
      if (val === 0) {
        for (let dr = -1; dr <= 1; dr++) for (let dc = -1; dc <= 1; dc++) revealCell(r+dr, c+dc);
      }
    }

    function loseGame(hitR, hitC) {
      clearInterval(timerInterval);
      gameOver = true;
      for (let r = 0; r < cfg.rows; r++) {
        for (let c = 0; c < cfg.cols; c++) {
          if (board[r][c] === -1) {
            const cell = getCell(r, c);
            if (r === hitR && c === hitC) { cell.className = 'cell mine-hit'; cell.textContent = '💣'; }
            else if (!flagged[r][c]) { cell.className = 'cell mine-shown'; cell.textContent = '💣'; }
          }
        }
      }
      const msg = document.getElementById('message');
      msg.textContent = '¡Manya! Te ganaron las minas 💀';
      msg.className = 'msg-lose';
    }

    function checkWin() {
      let unrevealed = 0;
      for (let r = 0; r < cfg.rows; r++) for (let c = 0; c < cfg.cols; c++) {
        if (!revealed[r][c]) unrevealed++;
      }
      if (unrevealed === cfg.mines) {
        clearInterval(timerInterval);
        gameOver = true;
        const msg = document.getElementById('message');
        msg.textContent = `¡Campeón Carbonero! ${seconds}s 🏆`;
        msg.className = 'msg-win';
      }
    }

    initGame();
  </script>
</body>
</html>
